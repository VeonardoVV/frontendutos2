<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CRUD Autos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow p-4">

    <h2 class="text-center mb-4">🚗 CRUD Categorías de Autos</h2>

    <!-- CREATE -->
    <div class="input-group mb-3">
      <input id="descripcion" type="text" class="form-control" placeholder="Nueva categoría">
      <button class="btn btn-primary" onclick="crearCategoria()">Crear</button>
    </div>

    <div class="text-center mb-3">
      <button class="btn btn-success" onclick="obtenerCategorias()">🔄 Ver categorías</button>
    </div>

    <!-- LIST -->
    <ul id="lista" class="list-group"></ul>

  </div>

</div>

<script>
  const API = "https://backendjs-gvd1.onrender.com/categorias";

  // GET
  async function obtenerCategorias() {
    const res = await fetch(API);
    const data = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(cat => {
      lista.innerHTML += `
        <li class="list-group-item d-flex justify-content-between align-items-center">
          
          <span>🚘 ${cat.descripcion}</span>

          <div>
            <button class="btn btn-warning btn-sm me-2" onclick="editar(${cat.id_categoria})">✏</button>
            <button class="btn btn-danger btn-sm" onclick="eliminar(${cat.id_categoria})">🗑</button>
          </div>

        </li>
      `;
    });
  }

  // POST
  async function crearCategoria() {
    const descripcion = document.getElementById("descripcion").value;

    if (!descripcion) return alert("Escribe una categoría");

    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ descripcion })
    });

    document.getElementById("descripcion").value = "";
    obtenerCategorias();
  }

  // DELETE
  async function eliminar(id) {
    await fetch(`${API}/${id}`, {
      method: "DELETE"
    });

    obtenerCategorias();
  }

  // PUT
  async function editar(id) {
    const nueva = prompt("Nueva descripción:");

    if (!nueva) return;

    await fetch(`${API}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ descripcion: nueva })
    });

    obtenerCategorias();
  }
</script>

</body>
</html>
